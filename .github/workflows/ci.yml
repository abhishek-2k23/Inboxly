name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_API_URL: http://localhost:4000
  OPENAI_API_KEY: dummy-key-for-ci
  DATABASE_URL: postgresql://hackathon:hackathon@localhost:5432/hackathon
  CLERK_PUBLISHABLE_KEY: pk_test_dummy-key-for-ci
  CLERK_SECRET_KEY: sk_test_dummy-key-for-ci
  CLERK_WEBHOOK_SIGNING_SECRET: whsec_dummy-key-for-ci

jobs:
  lint-test-build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: ai-hackathon-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: ai-hackathon-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
