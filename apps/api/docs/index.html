    <!--
      Inboxly API — Scalar reference.

      This page renders ../openapi.yaml with Scalar. Because browsers block
      fetching local files over file://, open it through a static server:

        # from apps/api/docs
        npx serve .            # then visit the printed URL
        # or
        python -m http.server  # then visit http://localhost:8000

      In production the same reference is served live by the API at /api/docs.
    -->
    <script
      id="api-reference"
      data-url="../openapi.yaml"
      data-configuration='{"theme":"purple","layout":"modern","hideDownloadButton":false,"metaData":{"title":"Inboxly API Reference"}}'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
